<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skincare Routine Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #ffe4f0 0%, #fdf0ff 50%, #ffe8f5 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #333;
    }

    .wrap { max-width: 660px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 2rem; }
    .emoji-banner { font-size: 40px; margin-bottom: 10px; }
    .header h1 { font-size: 30px; font-weight: 700; color: #c2185b; margin-bottom: 6px; }
    .header p { font-size: 14px; color: #888; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.2rem;
      box-shadow: 0 4px 20px rgba(194,24,91,0.08);
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.2rem; }

    .field label {
      font-size: 11px; font-weight: 700; color: #c2185b;
      display: block; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    select {
      width: 100%; padding: 10px 14px;
      border: 2px solid #f8bbd0; border-radius: 10px;
      font-size: 14px; background: #fff5f8; color: #333;
      cursor: pointer; outline: none;
    }
    select:focus { border-color: #c2185b; }

    .btn-generate {
      width: 100%; padding: 13px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700;
      background: linear-gradient(135deg, #e91e8c, #c2185b);
      color: white; cursor: pointer;
      box-shadow: 0 4px 14px rgba(194,24,91,0.35);
      margin-bottom: 10px;
    }
    .btn-generate:hover { opacity: 0.92; }
    .btn-generate:active { transform: scale(0.98); }

    .btn-reset {
      width: 100%; padding: 10px;
      border: 2px solid #f8bbd0; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      background: transparent; color: #c2185b; cursor: pointer;
    }
    .btn-reset:hover { background: #fff0f5; }

    .result-wrap { display: none; }

    .result-card {
      background: #fff; border-radius: 16px; padding: 1.5rem;
      box-shadow: 0 4px 20px rgba(194,24,91,0.08);
    }

    .routine-title {
      font-size: 15px; font-weight: 700; color: #c2185b;
      margin-bottom: 1rem; text-align: center;
      padding-bottom: 10px; border-bottom: 2px dashed #f8bbd0;
    }

    .time-card {
      border: 1.5px solid #f8bbd0; border-radius: 12px;
      padding: 1rem; margin-bottom: 12px;
    }

    .time-label {
      font-size: 12px; font-weight: 700;
      padding: 4px 14px; border-radius: 20px;
      display: inline-block; margin-bottom: 12px;
    }
    .am { background: #FFF3CD; color: #856404; }
    .pm { background: #D1ECF1; color: #0C5460; }

    .step { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .step:last-child { margin-bottom: 0; }

    .num {
      width: 26px; height: 26px; min-width: 26px; border-radius: 50%;
      background: linear-gradient(135deg, #e91e8c, #c2185b);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
    }

    .step-info { flex: 1; }
    .step-type { font-size: 11px; font-weight: 700; color: #c2185b; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
    .step-product { font-size: 14px; font-weight: 700; color: #222; margin-bottom: 3px; }
    .step-brand { font-size: 12px; color: #e91e8c; font-weight: 600; margin-bottom: 3px; }
    .step-desc { font-size: 12px; color: #888; line-height: 1.5; }

    .tip-box {
      background: linear-gradient(135deg, #fff0f5, #fdf0ff);
      border-left: 4px solid #e91e8c;
      border-radius: 0 10px 10px 0;
      padding: 12px 14px; margin-top: 14px;
      font-size: 13px; color: #555; line-height: 1.6;
    }
    .tip-box strong { color: #c2185b; }

    .copy-btn {
      margin-top: 14px; width: 100%; padding: 10px;
      border: 2px solid #f8bbd0; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      background: transparent; color: #c2185b; cursor: pointer;
    }
    .copy-btn:hover { background: #fff0f5; }

    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      .header h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="emoji-banner">🌸</div>
    <h1>Skincare Routine Generator</h1>
    <p>Personalized AM &amp; PM routines using locally available products</p>
  </div>

  <div class="card">
    <div class="row">
      <div class="field">
        <label for="skinType">Skin Type</label>
        <select id="skinType">
          <option value="oily">Oily</option>
          <option value="dry">Dry</option>
          <option value="combination">Combination</option>
        </select>
      </div>
      <div class="field">
        <label for="concern">Main Concern</label>
        <select id="concern">
          <option value="acne">Acne</option>
          <option value="pih">PIH / Dark Spots</option>
          <option value="dull">Dullness</option>
        </select>
      </div>
    </div>
    <button class="btn-generate" onclick="generate()">✨ Generate My Routine</button>
    <button class="btn-reset" onclick="reset()">Reset</button>
  </div>

  <div class="result-wrap" id="resultWrap">
    <div class="result-card">
      <div class="routine-title" id="routineTitle"></div>
      <div class="time-card">
        <span class="time-label am">☀️ Morning Routine</span>
        <div id="amSteps"></div>
      </div>
      <div class="time-card">
        <span class="time-label pm">🌙 Night Routine</span>
        <div id="pmSteps"></div>
      </div>
      <div class="tip-box" id="tipBox"></div>
      <button class="copy-btn" onclick="copyRoutine()">📋 Copy My Routine</button>
    </div>
  </div>
</div>

const skinLabels = { oily: "Oily", dry: "Dry", combination: "Combination" };
const concernLabels = { acne: "Acne", pih: "PIH / Dark Spots", dull: "Dullness" };

function buildSteps(steps, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  steps.forEach(function(s, i) {
    const div = document.createElement("div");
    div.className = "step";
    div.innerHTML =
      '<div class="num">' + (i + 1) + '</div>' +
      '<div class="step-info">' +
        '<div class="step-type">' + s.type + '</div>' +
        '<div class="step-product">' + s.product + '</div>' +
        '<div class="step-brand">by ' + s.brand + '</div>' +
        '<div class="step-desc">' + s.desc + '</div>' +
      '</div>';
    container.appendChild(div);
  });
}

function generate() {
  const skin = document.getElementById("skinType").value;
  const concern = document.getElementById("concern").value;
  const routine = data[skin][concern];
  document.getElementById("routineTitle").textContent =
    skinLabels[skin] + " Skin  ·  " + concernLabels[concern];
  buildSteps(routine.am, "amSteps");
  buildSteps(routine.pm, "pmSteps");
  document.getElementById("tipBox").innerHTML = "<strong>Pro tip:</strong> " + routine.tip;
  const rw = document.getElementById("resultWrap");
  rw.style.display = "block";
  rw.scrollIntoView({ behavior: "smooth", block: "start" });
}

function reset() {
  document.getElementById("resultWrap").style.display = "none";
  document.getElementById("skinType").value = "oily";
  document.getElementById("concern").value = "acne";
}

function copyRoutine() {
  const skin = document.getElementById("skinType").value;
  const concern = document.getElementById("concern").value;
  const r = data[skin][concern];
  let text = "MY SKINCARE ROUTINE — " + skinLabels[skin] + " skin / " + concernLabels[concern] + "\n\nMORNING:\n";
  r.am.forEach(function(s, i) {
    text += (i+1) + ". [" + s.type + "] " + s.product + " by " + s.brand + "\n   " + s.desc + "\n";
  });
  text += "\nNIGHT:\n";
  r.pm.forEach(function(s, i) {
    text += (i+1) + ". [" + s.type + "] " + s.product + " by " + s.brand + "\n   " + s.desc + "\n";
  });
  text += "\nPro tip: " + r.tip;
  navigator.clipboard.writeText(text).then(function() {
    const btn = document.querySelector(".copy-btn");
    btn.textContent = "Copied!";
    setTimeout(function() { btn.textContent = "📋 Copy My Routine"; }, 2000);
  });
}
</script>

</html>
